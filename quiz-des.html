        // --- VARIÁVEIS DE ESTADO ---
        let currentRound = 0;
        const TOTAL_ROUNDS = 10;

        // --- FUNÇÕES ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startNewGame() {
            currentRound = 0;
            showScreen('screen-game');
            loadRound();
        }

        function loadRound() {
            // Pega 3 respostas aleatórias diferentes
            const shuffled = [...ALL_ANSWERS].sort(() => 0.5 - Math.random());
            const options = shuffled.slice(0, 3);

            document.getElementById('round-number').innerText = currentRound + 1;

            // Renderizar opções
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach((opt, i) => {
                const letter = ["A", "B", "C"][i];
                const btn = document.createElement('button');
                btn.className = "option-btn flex items-center gap-5 p-5 rounded-2xl shadow-xl text-left font-black text-xl border-b-8 bg-white text-slate-900 border-slate-200 w-full";
                btn.innerHTML = `
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl text-white shadow-inner font-black bg-red-600">${letter}</div>
                    <div class="flex-1 uppercase tracking-tight leading-tight">${opt}</div>
                `;
                btn.onclick = () => selectOption(btn, container);
                container.appendChild(btn);
            });

            document.getElementById('next-btn').classList.add('hidden');
        }

        function selectOption(selectedBtn, container) {
            // Desabilita todos os botões
            const buttons = container.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            // Marca o selecionado como correto (sempre acerta!)
            selectedBtn.classList.replace('bg-white', 'bg-green-500');
            selectedBtn.classList.replace('text-slate-900', 'text-white');
            selectedBtn.classList.replace('border-slate-200', 'border-green-300');
            selectedBtn.classList.add('ring-4', 'ring-green-400/50', 'animate-bounce');
            selectedBtn.querySelector('div:first-child').classList.replace('bg-red-600', 'bg-green-700');

            // Escurece os não selecionados
            buttons.forEach(btn => {
                if (btn !== selectedBtn) {
                    btn.classList.add('bg-white/40', 'text-slate-400', 'scale-90', 'grayscale', 'opacity-50');
                }
            });

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextRound() {
            currentRound++;
            if (currentRound < TOTAL_ROUNDS) {
                loadRound();
            } else {
                finishGame();
            }
        }

        function finishGame() {
            showScreen('screen-final');
        }

            window.location.href = 'index.html';
