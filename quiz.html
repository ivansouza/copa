        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .timer-circle {
            transition: stroke-dashoffset 1s linear;
        }

        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }

        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }
    </style>

        // --- VARIÁVEIS DE ESTADO ---
        let currentIdx = 0;
        let score = 0;
        let timeLeft = 6;
        let timerInterval;
        let sessionQuestions = [];
        let selectedAnswer = null;
        let isMuted = false;
        let showCorrect = false;
        let audioCtx = null;

        // --- SISTEMA DE ÁUDIO ---
        function playSound(type) {
            if (isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'tick':
                    osc.frequency.setValueAtTime(880, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                    break;
                case 'correct':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.exponentialRampToValueAtTime(1046, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'wrong':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 'click':
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.1, now);
                    osc.start(now); osc.stop(now + 0.1);
                    break;
            }
        }

        // --- LÓGICA DO JOGO ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startNewGame() {
            playSound('click');
            score = 0;
            currentIdx = 0;
            sessionQuestions = [...ALL_QUESTIONS].sort(() => 0.5 - Math.random()).slice(0, 10);
            showScreen('screen-game');
            loadQuestion();
        }

        function loadQuestion() {
            const question = sessionQuestions[currentIdx];
            timeLeft = 6;
            showCorrect = false;
            selectedAnswer = null;

            // Atualizar UI
            document.getElementById('screen-game').className = `screen active min-h-screen flex-col items-center p-4 relative overflow-hidden bg-gradient-to-b ${question.col}`;
            document.getElementById('question-text').innerText = question.q;
            document.getElementById('question-number').innerText = currentIdx + 1;
            document.getElementById('timer-text').innerText = timeLeft;
            document.getElementById('timer-text').classList.remove('text-red-500', 'animate-ping');
            document.getElementById('next-btn').classList.add('hidden');
            
            // Renderizar opções
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            question.o.forEach((opt, i) => {
                const letter = ["A", "B", "C"][i];
                const btn = document.createElement('button');
                btn.className = "option-btn flex items-center gap-5 p-5 rounded-2xl shadow-xl text-left font-black text-xl border-b-8 bg-white text-slate-900 border-slate-200 w-full";
                btn.innerHTML = `
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl text-white shadow-inner font-black bg-red-500">${letter}</div>
                    <div class="flex-1 uppercase tracking-tight leading-tight">${opt}</div>
                `;
                btn.onclick = () => selectOption(i);
                container.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimerCircle();
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                updateTimerCircle();

                if (timeLeft > 0) playSound('tick');
                
                if (timeLeft <= 2) {
                    document.getElementById('timer-text').classList.add('text-red-500', 'animate-ping');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    revealCorrect(null);
                }
            }, 1000);
        }

        function updateTimerCircle() {
            const offset = 351.8 - (351.8 * timeLeft) / 6;
            document.getElementById('timer-progress').style.strokeDashoffset = offset;
        }

        function selectOption(index) {
            if (showCorrect) return;
            clearInterval(timerInterval);
            selectedAnswer = index;
            revealCorrect(index);
        }

        function revealCorrect(userIndex) {
            showCorrect = true;
            const question = sessionQuestions[currentIdx];
            const isCorrect = userIndex === question.c;

            if (isCorrect) {
                score++;
                playSound('correct');
            } else {
                playSound('wrong');
            }

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === question.c) {
                    btn.classList.replace('bg-white', 'bg-green-500');
                    btn.classList.replace('text-slate-900', 'text-white');
                    btn.classList.replace('border-slate-200', 'border-green-300');
                    btn.classList.add('ring-4', 'ring-green-400/50', 'animate-bounce');
                    btn.querySelector('div').classList.replace('bg-red-500', 'bg-green-600');
                } else if (i === userIndex) {
                    btn.classList.replace('bg-white', 'bg-red-500');
                    btn.classList.replace('text-slate-900', 'text-white');
                    btn.classList.replace('border-slate-200', 'border-red-700');
                    btn.classList.add('opacity-80', 'scale-95');
                } else {
                    btn.classList.add('bg-white/40', 'text-slate-400', 'scale-90', 'grayscale', 'opacity-50');
                }
            });

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            playSound('click');
            if (currentIdx < sessionQuestions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                finishGame();
            }
        }

        function finishGame() {
            document.getElementById('final-score').innerText = `${score}/10`;
            showScreen('screen-final');
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('volume-icon');
            if (isMuted) {
                icon.innerHTML = '<line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9l-2 2h-2v4h2l2 2v-8z"></path>';
            } else {
                icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
            }
        }
